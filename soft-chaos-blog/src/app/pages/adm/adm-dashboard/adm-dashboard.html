<div class="dashboard">
  <aside class="sidebar">
    <div class="logo">
      <img src="/images/Logo.png" alt="SoftChaos">

      <h3>Admin</h3>
    </div>

    <nav class="menu">
      <a routerLink="/security/adimin-dashboard/overview" routerLinkActive="active">
        <i class="fas fa-dashboard"></i> Dashboard
      </a>

      <a routerLink="/security/adimin-dashboard/create-article" routerLinkActive="active">
        <i class="fas fa-pen"></i> Novo Artigo
      </a>

      <a routerLink="/security/adimin-dashboard/comments" routerLinkActive="active">
        <i class="fas fa-comments"></i> Comentários
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="header">
      <h1>Dashboard Admin</h1>
      <div class="user-info">
        <span>{{ userName }}</span>
        <button (click)="logout()">Sair</button>
      </div>
    </header>
    
    <!-- Conteúdo dinâmico -->
    <router-outlet />
  </main>
</div>
