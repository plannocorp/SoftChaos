<!-- Recent Articles -->
@if (activeTab === 'articles' && recentArticles.length) {
  <div class="articles-grid">
    @for (article of recentArticles; track article.id) {
      <div class="article-card">
        <div class="article-info">
          <h4>{{ article.title }}</h4>
          <span class="status" [ngClass]="'status-' + (article.status.toLowerCase() || 'draft')">
            {{ article.status || 'DRAFT' }}
          </span>
          <span class="author">{{ article.authorName }}</span>
          <span class="date">{{ article.publishedAt | date:'short' }}</span>
          <div class="actions">
            <button (click)="editArticle(article.id)">Editar</button>
          </div>
        </div>
      </div>
    }
  </div>
}
