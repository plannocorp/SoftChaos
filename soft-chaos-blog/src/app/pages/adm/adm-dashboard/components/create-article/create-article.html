<section class="create-article">
  <section class="form-header">
    <div class="header-content">
      <h2>Novo Artigo</h2>
      <p>Preencha os campos abaixo para criar um novo artigo</p>
    </div>
    
    <div class="form-actions">
      <button 
        type="button" 
        class="btn-secondary" 
        routerLink="/security/adimin-dashboard/overview">
        Cancelar
      </button>
      
      <button 
        type="submit" 
        class="btn-primary"
        form="articleForm"
        [disabled]="loading">
        {{ loading ? 'Salvando...' : 'Publicar Artigo' }}
      </button>
    </div>
  </section>

  @if (error) {
    <div class="error-message">
      {{ error }}
    </div>
  }

  <form id="articleForm" (ngSubmit)="saveArticle()" class="article-form">
    <div class="form-grid">
      <!-- Título -->
      <div class="form-group">
        <label for="title">Título do Artigo</label>
        <input 
          id="title"
          type="text" 
          name="title"
          [(ngModel)]="article.title"
          placeholder="Digite o título do artigo"
          required>
      </div>

      <!-- Categoria (era "type") -->
      <div class="form-group">
        <label for="categoryId">Categoria</label>
        <select 
          id="categoryId"
          name="categoryId"
          [(ngModel)]="article.categoryId"
          required>
          <option value="" disabled>Selecione categoria</option>
          @for (cat of categories; track cat.id) {
            <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>

      <!-- Resumo (era "description") -->
      <div class="form-group full">
        <label for="summary">Resumo</label>
        <textarea 
          id="summary"
          name="summary"
          [(ngModel)]="article.summary"
          placeholder="Resumo do artigo (aparece nas prévias)"
          rows="3">
        </textarea>
      </div>

      <!-- Status + Opções -->
      <div class="form-group full options-row">
        <div class="status-section">
          <label for="status">Status</label>

          <select id="status" name="status" [(ngModel)]="article.status">
            <option value="DRAFT">Rascunho</option>

            <option value="PUBLISHED">Publicar</option>

            <option value="SCHEDULED">Agendado</option>
          </select>
        </div>
        
        <div class="options-section">
          <label class="toggle-option">
            <input type="checkbox" name="featured" [(ngModel)]="article.featured">

            <span class="toggle-label">Destaque</span>
          </label>

          <label class="toggle-option">
            <input type="checkbox" name="pinned" [(ngModel)]="article.pinned">

            <span class="toggle-label">Fixado</span>
          </label>
        </div>
      </div>

      <!-- Data de Publicação (só mostra se SCHEDULED) -->
      @if (article.status === 'SCHEDULED') {
        <div class="form-group">
          <label for="publishAt">Data de Publicação *</label>

          <input 
            id="publishAt"
            type="datetime-local"
            name="publishAt"
            [(ngModel)]="publishAtString"
            [min]="minDate"
            required
          >
        </div>
      }

      <!-- Autor (apenas visual - backend pega do token) -->
      <div class="form-group">
        <label for="author">Autor</label>
        <input 
          id="author"
          type="text"
          name="author"
          placeholder="Autor será preenchido automaticamente"
          disabled
        >
      </div>

      <!-- Imagem Principal -->
      <div class="form-group full">
        <label for="image">Imagem Principal</label>
        <input 
          id="image"
          type="file"
          name="image"
          (change)="onImageChange($event)"
          accept="image/*">
        
        @if (previewImage) {
          <div class="image-preview">
            <img [src]="previewImage" [alt]="article.title">
            <button type="button" (click)="clearImage()">Remover</button>
          </div>
        }
      </div>

      <!-- Conteúdo -->
      <div class="form-group full">
        <label for="content">Conteúdo</label>
        <textarea 
          id="content"
          name="content"
          [(ngModel)]="article.content"
          placeholder="Escreva o conteúdo completo do artigo..."
          rows="15"
          required>
        </textarea>
      </div>
    </div>
  </form>
</section>
