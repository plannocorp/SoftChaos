<app-header />

<div class="novidades">
    <h1 class="main-title">NOVIDADES</h1>

    <div class="main-content">
        @if (newsNovidades.length > 0) {
            @for (news of newsNovidades; track news.id) {
                <a [routerLink]="['/noticia/', news.slug]">
                    <div class="card">
                        <div class="img-box">
                            <!-- imageURL → imageUrl -->
                            <img [src]="news.imageUrl" [alt]="news.title">
                        </div>

                        <div class="text-box">
                            <h1 class="card-title">{{ news.title }}</h1>
                            <!-- description → subtitle (fallback opcional) -->
                            <p class="card-desc">{{ news.subtitle || 'Clique para ler a matéria completa' }}</p>
                        </div>
                    </div>
                </a>
            }
        } @else {
            <div class="no-news">
                <p>Nenhuma notícia até o momento...</p>
            </div>
        }
    </div>
</div>

<app-footer />
