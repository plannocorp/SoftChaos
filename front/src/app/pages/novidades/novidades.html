<app-header />

<div class="novidades">
    <h1 class="main-title">NOVIDADES</h1>

    <div class="main-content">
        @if (loading) {
            <app-loading-indicator label="Carregando novidades..." size="lg" />
        }

        @else if (error) {
            <app-loading-indicator [label]="error" size="md" surface="plain" />
        }

        @else if (newsNovidades) {
            @for (news of newsNovidades; track news.id) {
                <a [routerLink]="['/noticia', news.slug]">
                    <div class="card">
                        <div class="img-box">
                            <app-progressive-image
                              [src]="news.imageURL"
                              [alt]="news.title"
                              fallback="https://placehold.co/800x600?text=Soft+Chaos"
                            />
                        </div>
                        
                        <div class="text-box">
                            <h1 class="card-title">{{ news.title }}</h1>

                            <p class="card-desc">{{ news.description }}</p>
                        </div>
                    </div>
                </a>
            }
        }

        @else {
            <div class="no-news">
                <p>Nenhuma notícia até o momento...</p>
            </div>
        }
    </div>
</div>

<app-footer />
