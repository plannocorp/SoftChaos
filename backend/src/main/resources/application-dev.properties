# ========================================
# CONFIGURA«’ES DE DESENVOLVIMENTO
# ========================================

# ========================================
# BANCO DE DADOS H2 (Em MemÛria)
# ========================================
spring.datasource.url=jdbc:h2:mem:softchaos_dev
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# JPA/HIBERNATE
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# FLYWAY (Desabilitado em DEV com H2)
# ========================================
spring.flyway.enabled=false

# ========================================
# LOGGING (Mais verboso em DEV)
# ========================================
logging.level.com.softchaos=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ========================================
# CORS (Permissivo em DEV)
# ========================================
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# ========================================
# EMAIL (Mock em DEV - n„o envia emails reais)
# ========================================
spring.mail.host=localhost
spring.mail.port=1025
# Use MailHog ou similar para testar emails localmente
