# ========================================
# CONFIGURAÇÕES DE PRODUÇÃO
# ========================================

# ========================================
# BANCO DE DADOS POSTGRESQL
# ========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ========================================
# JPA/HIBERNATE
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ========================================
# FLYWAY (Habilitado em PROD)
# ========================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ========================================
# LOGGING (Menos verboso em PROD)
# ========================================
logging.level.root=WARN
logging.level.com.softchaos=INFO
logging.level.org.springframework.web=WARN

# ========================================
# CORS (Restritivo em PROD)
# ========================================
app.cors.allowed-origins=${FRONTEND_URL:https://seu-dominio.com}

# ========================================
# UPLOAD DE ARQUIVOS (Caminho absoluto)
# ========================================
app.upload.dir=/var/www/softchaos/uploads

# ========================================
# FRONTEND URL
# ========================================
app.frontend.url=${FRONTEND_URL:https://seu-dominio.com}

# ========================================
# SEGURANÇA
# ========================================
# Importado do .env ou do ambiente do servidor
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================================
# SSL/HTTPS
# ========================================
server.ssl.enabled=false
# Configure SSL se necessário
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_PASSWORD}
# server.ssl.key-store-type=PKCS12
