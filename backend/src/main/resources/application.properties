# ========================================
# PERFIL ATIVO
# ========================================
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ========================================
# NOME DA APLICAÃ‡ÃƒO
# ========================================
spring.application.name=SoftChaos Backend

# ========================================
# CONFIGURAÃ‡Ã•ES DE UPLOAD DE ARQUIVOS
# ========================================

# DiretÃ³rio onde os arquivos serÃ£o salvos
app.upload.dir=${user.home}/softchaos-uploads
media.storage.provider=${MEDIA_STORAGE_PROVIDER:local}
supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:softchaos-media}

# Tamanho mÃ¡ximo de arquivo (200MB em bytes)
app.upload.max-file-size=209715200

# Tipos de arquivo permitidos
app.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp,application/pdf

# ConfiguraÃ§Ãµes do Spring Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=220MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${java.io.tmpdir}

# ========================================
# SWAGGER/OPENAPI
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ConfiguraÃ§Ãµes adicionais
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json



# ========================================
# JACKSON (JSON)
# ========================================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ========================================
# JPA/HIBERNATE
# ========================================
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ========================================
# FLYWAY (MigraÃ§Ãµes de Banco de Dados)
# ========================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ========================================
# LOGGING
# ========================================
logging.level.root=INFO
logging.level.com.softchaos=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# CONFIGURAÃ‡Ã•ES DO FRONTEND
# ========================================
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# ========================================
# CONFIGURAÃ‡Ã•ES DE SEGURANÃ‡A JWT
# ========================================
jwt.secret=${JWT_SECRET:dev-secret-key-for-testing-only-not-for-production-use}
jwt.expiration=${JWT_EXPIRATION:86400000}
# 86400000 ms = 24 horas

# ========================================
# CONFIGURAÃ‡Ã•ES DE EMAIL
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email do remetente
app.email.from=${EMAIL_FROM:noreply@softchaos.com}
app.email.from-name=SoftChaos Blog

# ========================================
# CONFIGURAÃ‡Ã•ES DE AGENDAMENTO
# ========================================
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# ========================================
# ACTUATOR (Monitoramento)
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
