# ========================================
# PERFIL ATIVO
# ========================================
spring.profiles.active=dev

# ========================================
# NOME DA APLICA«√O
# ========================================
spring.application.name=SoftChaos Backend

# ========================================
# CONFIGURA«’ES DE UPLOAD DE ARQUIVOS
# ========================================

# DiretÛrio onde os arquivos ser„o salvos
app.upload.dir=${user.home}/softchaos-uploads

# Tamanho m·ximo de arquivo (10MB em bytes)
app.upload.max-file-size=10485760

# Tipos de arquivo permitidos
app.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp,video/mp4,application/pdf

# ConfiguraÁıes do Spring Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${java.io.tmpdir}

# ========================================
# SWAGGER/OPENAPI
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ConfiguraÁıes adicionais
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json



# ========================================
# JACKSON (JSON)
# ========================================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ========================================
# JPA/HIBERNATE
# ========================================
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ========================================
# FLYWAY (MigraÁıes de Banco de Dados)
# ========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ========================================
# LOGGING
# ========================================
logging.level.root=INFO
logging.level.com.softchaos=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# CONFIGURA«’ES DO FRONTEND
# ========================================
app.frontend.url=http://localhost:4200

# ========================================
# CONFIGURA«’ES DE SEGURAN«A JWT
# ========================================
jwt.secret=${JWT_SECRET:softchaos-secret-key-change-in-production-2024}
jwt.expiration=86400000
# 86400000 ms = 24 horas

# ========================================
# CONFIGURA«’ES DE EMAIL
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email do remetente
app.email.from=${EMAIL_FROM:noreply@softchaos.com}
app.email.from-name=SoftChaos Blog

# ========================================
# CONFIGURA«’ES DE AGENDAMENTO
# ========================================
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# ========================================
# ACTUATOR (Monitoramento)
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
