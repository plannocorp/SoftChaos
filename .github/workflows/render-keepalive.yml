name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 15 --max-time 120 \
            https://softchaos-backend.onrender.com/actuator/health
