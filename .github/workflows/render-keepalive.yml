name: Render Keepalive

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          for attempt in 1 2 3 4; do
            echo "Keepalive ping $attempt/4"
            curl --fail --silent --show-error \
              --retry 5 --retry-all-errors --retry-delay 15 --max-time 120 \
              https://softchaos-backend.onrender.com/actuator/health

            if [ "$attempt" -lt 4 ]; then
              sleep 540
            fi
          done
